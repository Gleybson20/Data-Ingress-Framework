name: dbt CI

on:
  pull_request:
    branches: [main]
    paths:
      - "dbt_project/**"
      - "requirements.txt"

jobs:
  dbt-test:
    name: dbt build + test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: dbt deps
        working-directory: dbt_project
        run: dbt deps

      - name: dbt compile (syntax check)
        working-directory: dbt_project
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: dbt compile --profiles-dir .

      - name: dbt test (Bronze + Silver only on CI — Gold is expensive)
        working-directory: dbt_project
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: dbt test --select tag:bronze tag:silver --profiles-dir .

      - name: dbt docs generate
        working-directory: dbt_project
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: dbt docs generate --profiles-dir .
